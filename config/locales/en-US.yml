connection.recommended_section_desc: 'These are not required to open the app, but they match common maintainer practice: install
  the `base-devel` group for toolchain completeness, use `fakeroot` for local `makepkg --fakeroot` checks, and add `devtools`
  so you can run clean-chroot builds (missing host libraries then show up before you push). Typical chroot state lives under
  `/var/lib/archbuild` after the first root is created. https://wiki.archlinux.org/title/DeveloperWiki:Building_in_a_clean_chroot'
