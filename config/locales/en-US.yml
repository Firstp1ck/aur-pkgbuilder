  cloned an empty repository—that is expected until the server accepts your first push (see the Arch wiki AUR submission
  guidelines).


  Prepare runs the same validation + .SRCINFO regeneration as Register, clones (or reuses) the AUR repo, stages PKGBUILD
  and .SRCINFO from your Sync directory into that clone, shows the diff, then you can commit and push.'
