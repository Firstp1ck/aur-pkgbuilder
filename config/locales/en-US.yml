home.add_package_help_body: 'Add package… opens the package editor to add or change this app''s local registry entry: pkgbase
  id, PKGBUILD download URL, package kind, and optional sync or destination folders.


  It does not create the Git repository on the AUR by itself—that is what Register new AUR package is for once that flow is
  complete.


  If your packages already exist on the AUR, Import from AUR account… can add several rows from your username at once. Use
  Add package… when import lists nothing, you are preparing a new pkgbase before it exists on the AUR, or you need custom
  paths or titles.'
