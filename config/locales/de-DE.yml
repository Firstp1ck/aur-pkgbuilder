ssh_setup.dialog_username_body: |-
  Noch kein AUR-Benutzername gespeichert. Unten eintragen und „Speichern und öffnen“ wählen — die App prüft ihn wie auf
  „Verbindung“ beim AUR, öffnet dann Ihr Profil zum Einfügen des öffentlichen SSH-Schlüssels.

  „Weiter“ öffnet die AUR-Registrierung, falls Sie noch kein Konto haben.
