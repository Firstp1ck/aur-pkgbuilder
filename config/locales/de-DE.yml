validate.section.optional_title: Optionale Linter
validate.section.optional_sub: Qualitätshinweise. Fehlende Werkzeuge werden mit Installationshinweis übersprungen.
validate.section.extended_title: Erweitert (fakeroot-Build)
validate.section.extended_sub: Baut das Paket tatsächlich mit fakeroot und prüft das Artefakt. Langsam — mehrere Minuten
  — und erzeugt eine echte .pkg.tar.*-Datei im Arbeitsverzeichnis.
