publish.default_desc_saved: '{template}   (Ihre gespeicherte Vorlage)'
publish.save_default_btn: Als Standard speichern
publish.reset_default_btn: Auf Standard zurücksetzen
publish.commit_section_title: Commit-Nachricht
publish.commit_section_sub: 'Vorausgefüllt aus Ihrer Standardvorlage ({pkg} für den Paketnamen). Hier nur diesen Commit
  anpassen oder „Als Standard speichern“, um die Vorlage für künftige Commits zu ändern.'
publish.stage_btn: Vorbereiten (Validieren + Klonen + .SRCINFO + Diff)
publish.stage_tooltip_no_ssh: Zuerst SSH einrichten und verifizieren.
publish.stage_tooltip_ok: 'Führt erforderliche Validierung und .SRCINFO-Neuerzeugung aus, klont bei Bedarf das AUR-Repo
  (Leer-Repo-Warnung beim ersten Klon ist bei neuer pkgbase normal), stagiert Dateien und zeigt den Diff.'
publish.push_btn: Committen und pushen
publish.push_tooltip_no_ssh: Zuerst SSH einrichten und verifizieren.
publish.push_tooltip_ok: 'Nach „Vorbereiten“: committet PKGBUILD + .SRCINFO und pusht zum AUR. Ein erfolgreicher Push
  veröffentlicht sofort — es gibt keinen separaten Freigabeschritt. Nur aktiv, wenn sich der Klon von HEAD unterscheidet.'
