validate.page_title: Validieren
validate.heading: 'PKGBUILD validieren — {title}'
validate.subtitle: Erforderliche Prüfungen starten automatisch beim Öffnen dieser Seite (wenn das Paketverzeichnis bekannt
  ist — Arbeitsverzeichnis oder absoluter Zielpfad auf „Sync“). „Alle Prüfungen ausführen“ inkludiert optionale Linter.
  Fehler bei erforderlichen Prüfungen führen sehr wahrscheinlich auch zu Build-Fehlern.
