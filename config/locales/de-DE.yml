home.add_package_help_body: '„Paket hinzufügen…“ öffnet den Paketeditor, um den lokalen Registry-Eintrag zu ändern oder
  anzulegen: pkgbase-ID, PKGBUILD-Download-URL, Paketart sowie optionale Sync- oder Zielordner.


  Das legt das Git-Repository auf dem AUR nicht selbst an — dafür dient „Neues AUR-Paket registrieren“, sobald dieser Ablauf
  fertig ist.


  Existieren Ihre Pakete schon auf dem AUR, kann „Vom AUR-Konto importieren…“ mehrere Zeilen auf einmal anlegen. Nutzen Sie
  „Paket hinzufügen…“, wenn der Import nichts liefert, Sie eine neue pkgbase vor dem AUR-Eintritt vorbereiten oder eigene
