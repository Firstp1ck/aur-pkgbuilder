publish.page_title: Veröffentlichen
publish.heading: 'Veröffentlichen — {title}'
publish.subtitle: '„Vorbereiten“ klont (oder nutzt erneut) das AUR-Git-Repository unter {url}. Bei einer neuen pkgbase kann Git
  warnen, dass ein leeres Repository geklont wurde — das ist erwartbar, bis der Server den ersten Push annimmt (siehe Arch-Wiki
  AUR-Einreichung).


  „Vorbereiten“ führt dieselbe Validierung und .SRCINFO-Neuerzeugung wie „Registrieren“ aus, klont (oder nutzt) das AUR-Repo,
  stagiert PKGBUILD und .SRCINFO aus Ihrem Sync-Verzeichnis in diesen Klon, zeigt den Diff, danach können Sie committen und
  pushen.'
publish.expectations_title: Was beim Veröffentlichen gilt
publish.expectations_sub: 'Das AUR wird vor Veröffentlichung nicht moderiert: Nach erfolgreichem Push sind die Quellen
  öffentlich. Rückfragen in Foren oder auf Mailinglisten sind bei Unsicherheit sinnvoll, aber freiwillig und ersetzen keine
  eigenen Prüfungen vor dem Push.'
publish.banner_ssh_title: 'SSH ist noch nicht verifiziert. Sie können das PKGBUILD bearbeiten, lokal bauen und .SRCINFO
  neu erzeugen, aber Commit und Push sind deaktiviert.'
publish.commit_message_row_title: Commit-Nachricht
publish.default_template_row_title: Standardvorlage
