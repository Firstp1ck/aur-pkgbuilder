  Upstream-PKGBUILD-URL können Sie später unter „Paket bearbeiten“ ergänzen, wenn Sie Sync nutzen.'
package_editor.blurb_new: 'Pflichtfelder sind mit * markiert. Wenn die pkgbase steht, „Veröffentlichen“ nutzen, um das
