name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Format check ──────────────────────────────────────────────────────
  # Ensures no unformatted code slips through.
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── Clippy (matches local AGENTS.md / CLAUDE.md gate) ─────────────────
  # `-D warnings` is the only lint gate we enforce today; see AGENTS.md
  # for the aspirational complexity / docs rules.
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libgraphene-1.0-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libgdk-pixbuf-2.0-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libwayland-dev \
            libwayland-client0 \
            libwayland-egl1

      - name: Cache cargo registry + build target
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
