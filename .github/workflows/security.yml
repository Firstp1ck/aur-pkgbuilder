name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly Monday 06:00 UTC — catch new advisories between PRs
    - cron: "0 6 * * 1"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Dependency vulnerability scan ──────────────────────────────────────
  # Checks Cargo.lock against the RustSec advisory database.
  # Fails when cargo-audit reports known advisories in dependencies.
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

  # ── Dependency diff review on PRs ──────────────────────────────────────
  # Flags new/changed dependencies with known vulnerabilities or
  # restrictive licenses before they land in main.
  dependency-review:
    name: dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: AGPL-3.0-only, GPL-3.0-only
          comment-summary-in-pr: on-failure

  # ── Secret scanning ────────────────────────────────────────────────────
  # Scans commits for accidentally committed secrets (API keys, tokens,
  # private keys, passwords). Complements GitHub's built-in secret
  # scanning with broader pattern coverage.
  #
  # We invoke gitleaks directly instead of gitleaks/gitleaks-action: on `push`,
  # the action runs `git log <oldest-in-payload>^..<newest>`, which fails when
  # the oldest commit has no parent (repo root in the same push), producing
  # exit code 1 and a partial scan (see gitleaks-action `src/index.js` +
  # `src/gitleaks.js`). A full `gitleaks detect` matches schedule scans and
  # stays correct for shallow edge cases.
  secrets:
    name: secret scan
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.24.3"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar --no-same-owner -xzf - -C "${tmpdir}"
          chmod +x "${tmpdir}/gitleaks"
          echo "GITLEAKS_BIN=${tmpdir}/gitleaks" >> "${GITHUB_ENV}"

      - name: Run gitleaks
        run: |
          set -euo pipefail
          "${GITLEAKS_BIN}" detect --redact -v --exit-code=2 \
            --report-format=sarif --report-path=results.sarif --source .

      - name: Upload gitleaks SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results.sarif
          path: results.sarif
          if-no-files-found: ignore

  # ── Cargo deny (advisories + license + ban) ────────────────────────────
  # More comprehensive than cargo-audit alone: also checks licenses and
  # can ban specific crates. Uses deny.toml for configuration.
  cargo-deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
